<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM Dashboard — Demo Sprint Live Example</title>
<link rel="stylesheet" href="../../css/shared.css">
<!-- Original SEO demo styles injected below -->
<style>
/* Push demo content below fixed nav and above fixed watermark */
body { padding-top: 48px; padding-bottom: 40px; }
</style>
</head>
<body>

<!-- DEMO SPRINT NAV -->
<nav class="ds-nav">
  <a class="ds-nav-logo" href="/">DEMO SPRINT</a>
  <button class="ds-nav-cta" onclick="openBriefModal()">Get yours built</button>
</nav>

<!-- BRIEF MODAL CONTAINER -->
<div id="ds-brief-modal"></div>

<!-- ═══════════════════════════════════════════
     ORIGINAL SEO DEMO CONTENT STARTS HERE
     Paste the full contents of crm demo
     BETWEEN the <body> tags (excluding <head>)
     below this comment block.
     ═══════════════════════════════════════════ -->

<main class="container">
    <header class="page-header">
      <div>
        <h1>SimpleCRM Dashboard</h1>
        <p class="subtitle">Manage and track your leads in a simple workflow.</p>
      </div>
      <a class="btn" href="/add">Add Lead</a>
    </header>

    <section class="card">
      <h2>All Leads</h2>
      <div id="message" class="message" aria-live="polite"></div>
      <div id="empty-state" class="empty-state" hidden>
        <p>No leads yet.</p>
        <p>Click <strong>Add Lead</strong> to create your first one.</p>
      </div>
      <div class="table-wrap">
        <table id="leads-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Status</th>
              <th>Created At</th>
              <th>Updated At</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="leads-body"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="/js/main.js"></script>
  <script>
    const tbody = document.getElementById('leads-body');
    const leadsTable = document.getElementById('leads-table');
    const emptyState = document.getElementById('empty-state');
    const message = document.getElementById('message');

    async function loadLeads() {
      try {
        const leads = await window.SimpleCRM.fetchLeads();

        if (!Array.isArray(leads) || leads.length === 0) {
          tbody.innerHTML = '';
          leadsTable.hidden = true;
          emptyState.hidden = false;
          return;
        }

        leadsTable.hidden = false;
        emptyState.hidden = true;
        tbody.innerHTML = leads
          .map((lead) => `
            <tr>
              <td>${lead.name}</td>
              <td><span class="status status-${lead.status.toLowerCase()}">${lead.status}</span></td>
              <td>${window.SimpleCRM.formatDate(lead.created_at)}</td>
              <td>${window.SimpleCRM.formatDate(lead.updated_at)}</td>
              <td><a class="btn-link" href="/edit?id=${lead.id}">Edit</a></td>
            </tr>
          `)
          .join('');
      } catch (error) {
        message.textContent = error.message;
        message.classList.add('error');
      }
    }

    loadLeads();
  </script>

<!-- ═══════════════════════════════════════════
     ORIGINAL SEO DEMO CONTENT ENDS HERE
     ═══════════════════════════════════════════ -->

<!-- WATERMARK STRIP -->
<div class="ds-watermark">
  <span class="ds-watermark-brand">DEMO SPRINT</span>
  <span class="ds-watermark-sep">·</span>
  <span>Built in 72 hours · $249</span>
  <span class="ds-watermark-sep">·</span>
  <button class="ds-watermark-cta" onclick="openBriefModal()">Get yours built →</button>
</div>

<script src="../../js/supabase-client.js"></script>
<script src="../../js/brief-modal.js"></script>
</body>
</html>
